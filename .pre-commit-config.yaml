repos:
  - repo: https://github.com/psf/black
    rev: 23.1.0
    hooks:
      - id: black
        name: black
        entry: black
        language: python
        language_version: python3
        types: [python]
        args: ["--config", "pyproject.toml"]


  - repo: https://github.com/pycqa/pylint
    rev: v3.1.0
    hooks:
      - id: pylint
        name: pylint
        entry: pylint
        language: python
        language_version: python3
        types: [python]
        args: ["--config", "pyproject.toml"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: python
        language_version: python3
        types: [python]
        args: ["--config", "pyproject.toml"]